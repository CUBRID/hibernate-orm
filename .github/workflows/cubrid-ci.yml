name: CUBRID CI

on:
  workflow_dispatch:
    inputs:
      gradle-args:
        description: 'Gradle tasks and filters to run against CUBRID'
        required: false
        default: ':hibernate-core:test'

permissions: {}

jobs:
  test:
    name: CUBRID ${{ matrix.cubrid-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        cubrid-version: [ "10.2", "11.0", "11.2", "11.3", "11.4" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reclaim disk space
        run: .github/ci-prerequisites.sh
      - name: Start CUBRID ${{ matrix.cubrid-version }}
        run: CUBRID_IMAGE=docker.io/cubrid/cubrid:${{ matrix.cubrid-version }} ./db.sh cubrid
      - name: Set up Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Run tests
        run: ./gradlew ${{ inputs.gradle-args }} -Pdb=cubrid -Plog-test-progress=true --stacktrace
        env:
          MAVEN_MIRROR: "https://maven-central.storage-download.googleapis.com/maven2/"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.cubrid-version }}
          path: '**/target/test-results/**/*.xml'
          if-no-files-found: warn
